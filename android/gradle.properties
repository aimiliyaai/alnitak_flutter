# 避免 G1 在 Windows 上 mmap 失败导致 daemon 崩溃（见 android/hs_err_*.log）
org.gradle.jvmargs=-Xmx1536m -Xms256m -XX:MaxMetaspaceSize=384m -XX:+HeapDumpOnOutOfMemoryError -XX:+UseParallelGC
# 限制并行，降低 release 构建峰值内存（尤其含 media_kit / 多 ABI）
org.gradle.workers.max=4
org.gradle.parallel=false
kotlin.daemon.jvmargs=-Xmx512m -XX:MaxMetaspaceSize=256m
android.useAndroidX=true
android.enableJetifier=true
kotlin.incremental=false
kotlin.incremental.java=false
kotlin.caching.enabled=false
org.gradle.caching=false
